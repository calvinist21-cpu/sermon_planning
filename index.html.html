<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연간 설교 계획 — 개혁주의 · 성서정과</title>
<style>
  :root{
    --burgundy:#6b1f2a; --burgundy-d:#4e161e; --gold:#b08d3c; --gold-l:#d9bb6e;
    --cream:#f7f2e7; --paper:#fffdf8; --ink:#2a2421; --muted:#8a7f72;
    --line:#e3d8c2; --navy:#21314d; --green:#3a5a40; --purple:#5b3a6b; --red:#8a2b2b;
    --shadow:0 2px 14px rgba(60,40,20,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Noto Serif KR","Nanum Myeongjo",serif;
    background:linear-gradient(180deg,#efe7d4 0%, #f7f2e7 220px);
    color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:0 18px 80px}
  header.top{
    background:linear-gradient(120deg,var(--burgundy-d),var(--burgundy) 60%, #7d2733);
    color:#fbf6ea; padding:26px 0 22px; border-bottom:4px solid var(--gold);
    box-shadow:var(--shadow);
  }
  header.top .wrap{padding-bottom:0}
  .brand{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .lab-link{margin-left:auto;display:flex;align-items:center;gap:9px;text-decoration:none;
    background:rgba(0,0,0,.16);border:1px solid var(--gold-l);border-radius:30px;padding:8px 16px;
    color:#fbf6ea;transition:.18s}
  .lab-link:hover{background:var(--gold);color:#3a2410;border-color:var(--gold)}
  .lab-link:hover .lab-text small{color:#5a3c10}
  .lab-mark{font-size:18px;color:var(--gold-l)}
  .lab-link:hover .lab-mark{color:#3a2410}
  .lab-text{display:flex;flex-direction:column;line-height:1.15;font-size:15px;font-weight:700;letter-spacing:.3px}
  .lab-text small{font-weight:400;font-size:9.5px;letter-spacing:1.5px;color:var(--gold-l);margin-top:1px}
  @media(max-width:640px){.lab-link{margin-left:0}}
  .crest{width:46px;height:46px;border:2px solid var(--gold-l);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--gold-l);
    background:rgba(0,0,0,.12)}
  h1{font-size:25px;margin:0;letter-spacing:.5px;font-weight:700}
  .sub{font-size:13px;color:var(--gold-l);margin-top:3px;letter-spacing:2px;font-weight:400}
  .tagline{font-size:12.5px;color:#e9dcc4;margin-top:8px;font-style:italic;opacity:.92}

  /* mode tabs */
  .modebar{display:flex;gap:0;margin-top:18px;border:1px solid var(--gold);border-radius:10px;overflow:hidden;max-width:760px}
  .modebtn{flex:1;background:rgba(0,0,0,.18);color:#e7d9bd;border:none;padding:13px 14px;
    cursor:pointer;font-family:inherit;font-size:14.5px;font-weight:700;transition:.18s;text-align:center;line-height:1.35}
  .modebtn small{display:block;font-weight:400;font-size:11px;color:#caa86a;margin-top:2px;letter-spacing:.5px}
  .modebtn.active{background:var(--gold);color:#3a2410}
  .modebtn.active small{color:#5a3c10}
  .modebtn+.modebtn{border-left:1px solid var(--gold)}

  /* control panel */
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:20px 22px;margin-top:22px}
  .panel h2{font-size:15px;margin:0 0 14px;color:var(--burgundy);letter-spacing:.5px;
    border-left:4px solid var(--gold);padding-left:10px}
  .controls{display:flex;flex-wrap:wrap;gap:16px 22px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.3px}
  .field input,.field select{font-family:inherit;font-size:14px;padding:8px 11px;border:1px solid var(--line);
    border-radius:8px;background:#fff;color:var(--ink);min-width:120px}
  .field input:focus,.field select:focus{outline:2px solid var(--gold-l);border-color:var(--gold)}
  .chk{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink)}
  .chk input{width:16px;height:16px;accent-color:var(--burgundy)}

  .btnrow{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  button.act{font-family:inherit;font-size:13.5px;font-weight:700;padding:10px 18px;border-radius:9px;
    border:1px solid var(--burgundy);background:var(--burgundy);color:#fbf3e4;cursor:pointer;transition:.15s;letter-spacing:.3px}
  button.act:hover{background:var(--burgundy-d)}
  button.ghost{background:#fff;color:var(--burgundy)}
  button.ghost:hover{background:#f3e7e9}
  button.gold{background:var(--gold);border-color:var(--gold);color:#3a2410}
  button.gold:hover{background:#9c7a2e}

  /* meta strip */
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .pill{background:#fff;border:1px solid var(--line);border-radius:30px;padding:6px 15px;font-size:12.5px;color:var(--ink)}
  .pill b{color:var(--burgundy)}
  .pill.acc{background:var(--burgundy);color:#fbf3e4;border-color:var(--burgundy)}
  .pill.acc b{color:var(--gold-l)}

  .note{font-size:12.5px;color:#7a6a52;background:#fbf4e2;border:1px dashed var(--gold);
    border-radius:10px;padding:11px 14px;margin-top:16px;line-height:1.6}
  .note b{color:var(--burgundy)}

  /* table */
  .tablewrap{margin-top:24px;background:var(--paper);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:13px;min-width:980px}
  thead th{background:var(--burgundy);color:#f7e9cf;font-weight:700;padding:11px 9px;text-align:left;
    position:sticky;top:0;border-right:1px solid rgba(255,255,255,.12);font-size:12.5px;letter-spacing:.3px}
  thead th:last-child{border-right:none}
  tbody td{padding:8px 9px;border-bottom:1px solid var(--line);border-right:1px solid #efe6d3;vertical-align:top}
  tbody td:last-child{border-right:none}
  tbody tr:hover{background:#fbf6ea}
  .wk{font-weight:700;color:var(--burgundy);text-align:center;width:38px}
  .dt{white-space:nowrap;color:var(--ink);font-size:12.5px}
  .dt .ymd{font-weight:700}
  .dt .rel{display:block;font-size:11px;color:var(--muted)}
  td[contenteditable]{cursor:text}
  td[contenteditable]:focus{outline:2px solid var(--gold-l);background:#fffaf0;border-radius:4px}
  .empty-hint{color:#c3b69c;font-style:italic}

  /* season badges */
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;line-height:1.7}
  .b-advent{background:var(--purple)} .b-christmas{background:#9a7a1f}
  .b-epiphany{background:#2f6f8f} .b-ordinary{background:#5a7a52}
  .b-lent{background:#5a4a7a} .b-holyweek{background:var(--red)}
  .b-easter{background:#c79a1e;color:#3a2410} .b-pentecost{background:#b8431f}
  .b-trinity{background:var(--navy)} .b-kingdom{background:#7a5a1a}
  .b-special{background:var(--burgundy)}
  .liturg{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11.5px;font-weight:700;white-space:nowrap;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .yearmark{display:inline-block;font-weight:700;border:1px solid var(--gold);color:var(--burgundy);
    border-radius:6px;padding:1px 7px;font-size:11px;margin-left:4px;background:#fdf6e4}
  .proper{font-size:11px;color:var(--muted);display:block;margin-top:2px}
  .feast-star{color:var(--gold);margin-right:3px}

  .readcell{font-size:12px;line-height:1.55}
  .readcell .conf{color:var(--ink)}
  .readcell .unconf{color:#b08a4a;font-style:italic}

  footer.foot{text-align:center;margin-top:34px;color:var(--muted);font-size:12px;line-height:1.8}
  footer.foot .div{color:var(--gold);letter-spacing:6px;margin-bottom:6px}

  .hidden{display:none !important}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;font-size:11px}
  .legend span{display:flex;align-items:center;gap:5px;color:var(--muted)}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}

  @media print{
    body{background:#fff}
    header.top,.panel,.note,.btnrow,.modebar,.legend,footer.foot,#savebar{display:none !important}
    .tablewrap{box-shadow:none;border:none;border-radius:0;margin-top:0}
    .printhead{display:block !important;text-align:center;margin:0 0 12px}
    thead th{background:#6b1f2a !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    table{font-size:10.5px;min-width:0}
    tbody tr{page-break-inside:avoid}
  }
  .printhead{display:none}
  .printhead h2{color:var(--burgundy);margin:0;font-size:20px}
  .printhead p{color:var(--muted);font-size:12px;margin:4px 0 0}
</style>

<script>
/* ============================================================
   교회력(Liturgical Calendar) 계산 엔진
   - 부활절: Gregorian Computus (서방교회)
   - 대림절 시작·사순절·부활절기·성령강림·삼위일체·왕이신 그리스도 주일
   - 성서정과 연도(A/B/C) 및 Proper 번호 산정
   ============================================================ */
function computus(y){ // Western Easter (Gregorian)
  const a=y%19, b=Math.floor(y/100), c=y%100, d=Math.floor(b/4), e=b%4,
        f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30, i=Math.floor(c/4), k=c%4,
        l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451),
        month=Math.floor((h+l-7*m+114)/31), day=((h+l-7*m+114)%31)+1;
  return new Date(y, month-1, day);
}
const DAY=86400000;
function addDays(dt,n){return new Date(dt.getTime()+n*DAY);}
function same(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function ymd(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function kdate(dt){const w=['일','월','화','수','목','금','토'][dt.getDay()];return (dt.getMonth()+1)+'월 '+dt.getDate()+'일 ('+w+')';}

// 대림절 첫 주일 = 성탄(12/25) 직전 4번째 주일
function adventStart(year){
  const xmas=new Date(year,11,25);
  const dow=xmas.getDay();
  const fourthAdvent=addDays(xmas, -(dow===0?7:dow)); // 성탄 직전 주일
  return addDays(fourthAdvent,-21); // 그 3주 전
}
// 성서정과 연도 글자: Y%3==1→A, ==2→B, ==0→C (Advent 시작점에서 다음 교회력으로 전환)
function rclLetterForCivil(y){const m=((y%3)+3)%3; return m===1?'A':m===2?'B':'C';}
function rclYearOf(sunday){
  const y=sunday.getFullYear();
  const adv=adventStart(y);
  return sunday.getTime()>=adv.getTime() ? rclLetterForCivil(y+1) : rclLetterForCivil(y);
}

/* 한 해의 모든 주일 반환 */
function sundaysOf(year){
  let d=new Date(year,0,1);
  while(d.getDay()!==0) d=addDays(d,1);
  const out=[];
  while(d.getFullYear()===year){ out.push(d); d=addDays(d,7); }
  return out;
}

function firstSundayAfter(dt){let d=addDays(dt,1);while(d.getDay()!==0)d=addDays(d,1);return d;}

/* 절기/특별주일 태깅 — 각 주일에 교회력 CODE 부여(성서정과 데이터 키) */
function seasonInfo(sun){
  const y=sun.getFullYear();
  const easter=computus(y);
  const ash=addDays(easter,-46);
  const palm=addDays(easter,-7);
  const ascension=addDays(easter,39);
  const pentecost=addDays(easter,49);
  const trinity=addDays(easter,56);
  const advent1=adventStart(y);
  const advent2=addDays(advent1,7), advent3=addDays(advent1,14), advent4=addDays(advent1,21);
  const christKing=addDays(advent1,-7);
  const t=sun.getTime();
  const eq=(a)=>same(sun,a);

  let season='ordinary', label='연중 주일', badge='b-ordinary', feast=false, code='';

  // ===== 대림절 (advent1 ~ advent4) =====
  if(t>=advent1.getTime() && t<=advent4.getTime()){
    season='advent';badge='b-advent';feast=true;
    if(eq(advent1)){label='대림절 첫째 주일';code='ADV1';}
    else if(eq(advent2)){label='대림절 둘째 주일';code='ADV2';}
    else if(eq(advent3)){label='대림절 셋째 주일';code='ADV3';}
    else {label='대림절 넷째 주일';code='ADV4';}
  }
  // ===== 왕이신 그리스도 주일 (대림 직전) =====
  else if(eq(christKing)){season='kingdom';badge='b-kingdom';feast=true;label='왕이신 그리스도 주일 (교회력 마지막)';code='PROPER29';}
  // ===== 성탄주일 (12/25) =====
  else if(sun.getMonth()===11 && sun.getDate()===25){season='christmas';badge='b-christmas';feast=true;label='성탄주일 (성탄절)';code='XMAS';}
  // ===== 성탄 후 (12/26~12/31) =====
  else if(sun.getMonth()===11 && sun.getDate()>25){season='christmas';badge='b-christmas';feast=true;label='성탄 후 첫째 주일';code='XMAS1';}
  // ===== 성탄 후 (1/1~1/5) =====
  else if(sun.getMonth()===0 && sun.getDate()<=5){
    season='christmas';badge='b-christmas';feast=true;
    const fs=firstSundayAfter(new Date(y-1,11,25));
    if(same(sun,fs)){label='성탄 후 첫째 주일';code='XMAS1';}
    else {label='성탄 후 둘째 주일';code='XMAS2';}
  }
  // ===== 주현절 (1/6 주일) =====
  else if(sun.getMonth()===0 && sun.getDate()===6){season='epiphany';badge='b-epiphany';feast=true;label='주현절 (주님의 나타나심)';code='EPIPHANY';}
  // ===== 주현절기 (주님의 세례 ~ 산상변모, 사순 전) =====
  else if(t>=new Date(y,0,6).getTime() && t<ash.getTime()){
    season='epiphany';badge='b-epiphany';
    const baptism=firstSundayAfter(new Date(y,0,6));
    let preLent=addDays(ash,-1); while(preLent.getDay()!==0) preLent=addDays(preLent,-1);
    if(same(sun,baptism)){label='주님의 세례 주일';code='BAPTISM';feast=true;}
    else if(same(sun,preLent)){label='산상변모 주일 (주현절 마지막)';code='TRANSFIG';feast=true;}
    else{
      const n=Math.round((sun.getTime()-baptism.getTime())/(7*DAY))+1;
      label='주현절 후 제'+n+'주일';code='EPI'+n;
    }
  }
  // ===== 사순절 / 고난주간 =====
  else if(t>=ash.getTime() && t<easter.getTime()){
    season='lent';badge='b-lent';feast=true;
    if(eq(palm)){season='holyweek';badge='b-holyweek';label='종려주일 / 고난주일';code='PALM';}
    else{
      const wk=Math.round((sun.getTime()-(addDays(easter,-42)).getTime())/(7*DAY));
      const names=['사순절 첫째 주일','사순절 둘째 주일','사순절 셋째 주일','사순절 넷째 주일','사순절 다섯째 주일'];
      label=names[wk]||'사순절 주일';code='LENT'+(wk+1);
    }
  }
  // ===== 부활절기 =====
  else if(eq(easter)){season='easter';badge='b-easter';feast=true;label='부활주일 (부활절)';code='EASTER';}
  else if(t>easter.getTime() && t<pentecost.getTime()){
    season='easter';badge='b-easter';feast=true;
    const wk=Math.round((sun.getTime()-easter.getTime())/(7*DAY))+1; // 2..7
    label='부활절 '+['','','둘째','셋째','넷째','다섯째','여섯째','일곱째'][wk]+' 주일';
    code='EASTER'+wk;
    if(t>ascension.getTime() && wk===7) label='부활절 일곱째 주일 (승천 후)';
  }
  // ===== 성령강림 / 삼위일체 =====
  else if(eq(pentecost)){season='pentecost';badge='b-pentecost';feast=true;label='성령강림주일 (오순절)';code='PENTECOST';}
  else if(eq(trinity)){season='trinity';badge='b-trinity';feast=true;label='삼위일체주일';code='TRINITY';}
  // ===== 성령강림 후 (연중, Proper 4~28) =====
  else if(t>trinity.getTime() && t<christKing.getTime()){
    season='ordinary';badge='b-ordinary';
    const wk=Math.round((sun.getTime()-pentecost.getTime())/(7*DAY));
    label='성령강림 후 제'+wk+'주';
    const pn=29-Math.round((christKing.getTime()-sun.getTime())/(7*DAY));
    code='PROPER'+pn;
  }
  else { season='ordinary';badge='b-ordinary';label='연중 주일';code=''; }

  let proper = (code.indexOf('PROPER')===0) ? code.replace('PROPER','Proper ') : '';

  return {season,label,badge,feast,code,rclYear:rclYearOf(sun),proper};
}

/* 한국 장로교(예장합동) 특별주일 — 절기 위에 덧입힘 */
function koreanSpecial(sun, allSundays){
  const y=sun.getFullYear(), mo=sun.getMonth(), da=sun.getDate();
  const nth=(n,month)=>{ // n번째 주일(0-base 아님)
    const ms=allSundays.filter(s=>s.getMonth()===month);
    return ms[n-1] && same(sun,ms[n-1]);
  };
  const last=(month)=>{ const ms=allSundays.filter(s=>s.getMonth()===month); return ms.length&&same(sun,ms[ms.length-1]); };
  const tags=[];
  if(mo===0 && nth(1,0)) tags.push('신년 주일');
  if(mo===4 && nth(1,4)) tags.push('어린이 주일');
  if(mo===4 && nth(2,4)) tags.push('어버이 주일 / 가정의 달');
  if(mo===4 && nth(3,4)) tags.push('스승의 주일');
  if(mo===6 && nth(1,6)) tags.push('맥추감사주일');
  if(mo===9 && nth(1,9)) tags.push('세계 성찬 주일');
  if(mo===9 && last(9))  tags.push('종교개혁기념주일');
  if(mo===10 && nth(3,10)) tags.push('추수감사주일');
  return tags;
}

function convertRef(s){
  if(!s) return '';
  let out=s;
  for(const [en,ko] of BOOK_KO){ out=out.split(en).join(ko); }
  out=out.split(' or ').join(' 또는 ');
  out=out.split(' and ').join(', ');
  out=out.split('Passion:').join('수난:');
  return out;
}

/* ============================================================
   상태 & 렌더링
   ============================================================ */
let MODE='hapdong';
let ROWS=[]; // 생성된 행 데이터(편집 반영용은 DOM에서 읽음)

function setMode(m){
  MODE=m;
  document.querySelectorAll('.modebtn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  document.querySelectorAll('.hapdong-only').forEach(e=>e.classList.toggle('hidden',m!=='hapdong'));
  document.querySelectorAll('.rcl-only').forEach(e=>e.classList.toggle('hidden',m!=='rcl'));
  renderNote();
  if(ROWS.length) generate();
}

function renderNote(){
  const el=document.getElementById('modenote');
  if(MODE==='hapdong'){
    el.innerHTML='<b>개혁주의 강해 모드</b> · 교회력과 한국 장로교(예장합동) 절기를 자동 배치하고, 선택한 <b>연속 강해(lectio continua)</b> 본문을 비(非)절기 주일에 순서대로 배분합니다. 절기 주일은 절기 본문을 우선합니다. 모든 칸은 직접 수정 가능합니다.';
  }else{
    el.innerHTML='<b>성서정과(RCL) 모드</b> · 부활절 계산(Computus)으로 교회력을 산정하고 <b>A·B·C 3년 주기</b>를 자동 판별하여 <b>매 주일 4본문(구약·시편·서신·복음)을 빈칸 없이</b> 채웁니다. 매 주일 <b>예전색(Reformed 전통)</b>도 함께 표기합니다. <b style="color:#a05a1a">유의:</b> 한 해 안에서도 대림절을 기점으로 정과 연도가 바뀝니다(표의 연도 표시 참조). 성령강림 후 본문은 반(半)연속(Track 1)이며, 데이터 출처는 <a href="https://lectionary.library.vanderbilt.edu/" target="_blank">Vanderbilt Divinity Library · CCT 공식 성서정과</a>입니다. 모든 칸은 직접 수정 가능합니다.';
  }
}

function badgeHTML(info,specials){
  let s='<span class="badge '+info.badge+'">'+(info.feast?'<span class="feast-star">✦</span>':'')+info.label+'</span>';
  specials.forEach(t=>{ s+=' <span class="badge b-special">'+t+'</span>'; });
  return s;
}

/* 예전색 (Reformed 전통 — Vanderbilt Lectionary 'colors' 참조) */
function litColor(info){
  const c=info.code, s=info.season;
  if(s==='advent') return {ko:'자색(보라)', hex:'#6a3d9a'};
  if(s==='lent')   return {ko:'자색(보라)', hex:'#6a3d9a'};
  if(s==='holyweek'||c==='PALM') return {ko:'홍색', hex:'#b03030'};
  if(s==='pentecost') return {ko:'홍색', hex:'#c0392b'};
  if(s==='christmas'||s==='easter'||s==='trinity'||s==='kingdom') return {ko:'백색', hex:'#f6f1e1', dark:true};
  if(s==='epiphany'){
    if(c==='EPIPHANY'||c==='BAPTISM'||c==='TRANSFIG') return {ko:'백색', hex:'#f6f1e1', dark:true};
    return {ko:'녹색', hex:'#3a7a3a'};
  }
  return {ko:'녹색', hex:'#3a7a3a'}; // ordinary
}
function colorCell(info,specials){
  let lc=litColor(info);
  if(specials && specials.indexOf('종교개혁기념주일')>=0) lc={ko:'홍색', hex:'#c0392b'}; // 종교개혁주일 = 적색
  const border=lc.dark?'border:1px solid #d8cca8;':'';
  const txt=lc.dark?'#6b5a2a':'#fff';
  return '<span class="liturg" style="background:'+lc.hex+';'+border+'color:'+txt+'">'+lc.ko+'</span>';
}

function generate(){
  const year=parseInt(document.getElementById('year').value)||new Date().getFullYear();
  const sundays=sundaysOf(year);
  ROWS=[];
  sundays.forEach((sun,i)=>{
    const info=seasonInfo(sun);
    const specials=koreanSpecial(sun,sundays);
    ROWS.push({sun,info,specials});
  });

  // 강해 배분 (합동)
  if(MODE==='hapdong'){
    const sk=document.getElementById('series').value;
    const fmode=document.getElementById('festivalmode').value;
    if(sk && SERIES[sk]){
      const units=SERIES[sk].units; let u=0;
      ROWS.forEach(r=>{
        const isFestival=r.info.feast || r.specials.length>0;
        if(fmode==='festival' && isFestival){ r._series=null; }
        else { r._series = units[u] || null; if(units[u]) u++; }
      });
    }
  }

  renderTable(year);
  renderMeta(year);
}

function renderMeta(year){
  const easter=computus(year);
  const meta=document.getElementById('meta');
  const adv=adventStart(year);
  let html='';
  html+='<span class="pill"><b>'+year+'년</b> · 주일 '+ROWS.length+'회</span>';
  if(MODE==='rcl'){
    html+='<span class="pill acc">정과 연도 <b>'+rclLetterForCivil(year)+'</b> → (대림 이후) <b>'+rclLetterForCivil(year+1)+'</b></span>';
  }else{
    html+='<span class="pill acc">예장합동 · 개혁주의 강해</span>';
  }
  html+='<span class="pill">부활절 <b>'+kdate(easter)+'</b></span>';
  html+='<span class="pill">성령강림 <b>'+kdate(addDays(easter,49))+'</b></span>';
  html+='<span class="pill">대림 시작 <b>'+kdate(adv)+'</b></span>';
  meta.innerHTML=html;

  // legend
  const leg=document.getElementById('legend');
  const items=[['b-advent','대림'],['b-christmas','성탄'],['b-epiphany','주현'],['b-lent','사순'],
    ['b-holyweek','고난주간'],['b-easter','부활'],['b-pentecost','성령강림'],['b-trinity','삼위일체'],
    ['b-ordinary','연중'],['b-kingdom','왕이신 그리스도'],['b-special','한국 장로교 특별주일']];
  let lh=items.map(it=>'<span><i class="badge '+it[0]+'" style="width:13px;height:13px"></i>'+it[1]+'</span>').join('');
  lh+='<span style="width:100%;height:0"></span>';
  lh+='<span style="font-weight:700;color:var(--burgundy)">예전색(Reformed):</span>';
  const cols=[['#6a3d9a','자색 — 대림·사순'],['#f6f1e1','백색 — 성탄·주현일·세례·변모·부활·삼위일체·그리스도왕'],
    ['#3a7a3a','녹색 — 주현후·연중'],['#c0392b','홍색 — 성령강림·종려·종교개혁주일']];
  lh+=cols.map(c=>'<span><i style="width:13px;height:13px;border-radius:3px;display:inline-block;background:'+c[0]+';border:1px solid #cbb98a"></i>'+c[1]+'</span>').join('');
  leg.innerHTML=lh;
}

function renderTable(year){
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  const church=document.getElementById('church').value.trim();
  document.getElementById('printhead').innerHTML=
    '<h2>'+(church?church+' · ':'')+year+'년 연간 설교 계획</h2>'+
    '<p>'+(MODE==='hapdong'?'개혁주의 강해 (예장합동 · 교회력)':'성서정과 Revised Common Lectionary')+' · 비전AI교육연구소</p>';

  if(MODE==='hapdong'){
    thead.innerHTML='<tr>'+
      '<th>주</th><th>주일</th><th>교회력 / 절기</th><th>예전색</th><th>설교 주제</th><th>본문</th>'+
      '<th>대지 (1·2·3)</th><th>찬송</th><th>비고</th></tr>';
  }else{
    thead.innerHTML='<tr>'+
      '<th>주</th><th>주일</th><th>교회력 (정과주기)</th><th>예전색</th><th>구약</th><th>시편</th>'+
      '<th>서신</th><th>복음</th><th>설교 본문·비고</th></tr>';
  }

  let rows='';
  ROWS.forEach((r,i)=>{
    const wk=i+1;
    const dt='<div class="dt"><span class="ymd">'+kdate(r.sun)+'</span></div>';
    const colTd='<td>'+colorCell(r.info,r.specials)+'</td>';
    if(MODE==='hapdong'){
      const f=FESTIVAL_SUGGEST[r.info.label] || (r.specials.length?FESTIVAL_SUGGEST[r.specials[0]]:null);
      let theme='', text='', hymn='';
      if(r._series){ text=r._series.split(' ').slice(0,2).join(' '); theme='강해 — '+r._series.replace(/^[^ ]+ /,''); }
      if(f){ theme=f.theme; text=f.text; hymn=f.hymn; }
      if(r._series && !f){ theme=''; text=r._series; }
      rows+='<tr>'+
        '<td class="wk">'+wk+'</td>'+
        '<td>'+dt+'</td>'+
        '<td>'+badgeHTML(r.info,r.specials)+'</td>'+
        colTd+
        '<td contenteditable>'+(theme||'<span class="empty-hint">주제 입력</span>')+'</td>'+
        '<td contenteditable>'+(text||'<span class="empty-hint">본문 입력</span>')+'</td>'+
        '<td contenteditable><span class="empty-hint">① ② ③</span></td>'+
        '<td contenteditable>'+(hymn||'<span class="empty-hint">찬송</span>')+'</td>'+
        '<td contenteditable></td>'+
        '</tr>';
    }else{
      const yr=r.info.rclYear;
      const data=(RCL_DATA[yr]||{})[r.info.code];
      let ot='',ps='',ep='',go='';
      if(data){ ot=convertRef(data.ot); ps=convertRef(data.ps); ep=convertRef(data.ep); go=convertRef(data.go); }
      const fill=document.getElementById('rclfill').value;
      const ph=(v)=> (fill==='empty') ? '<span class="empty-hint">—</span>'
                   : (v ? '<span class="conf">'+v+'</span>' : '<span class="unconf">정과표 확인</span>');
      const yrmark='<span class="yearmark">'+yr+'</span>'+(r.info.proper?'<span class="proper">'+r.info.proper+'</span>':'');
      rows+='<tr>'+
        '<td class="wk">'+wk+'</td>'+
        '<td>'+dt+'</td>'+
        '<td>'+badgeHTML(r.info,r.specials)+yrmark+'</td>'+
        colTd+
        '<td class="readcell" contenteditable>'+ph(ot)+'</td>'+
        '<td class="readcell" contenteditable>'+ph(ps)+'</td>'+
        '<td class="readcell" contenteditable>'+ph(ep)+'</td>'+
        '<td class="readcell" contenteditable>'+ph(go)+'</td>'+
        '<td contenteditable></td>'+
        '</tr>';
    }
  });
  tbody.innerHTML=rows;
}

/* ============================================================
   저장 / 불러오기 / 내보내기
   ============================================================ */
function snapshot(){
  const cells=[];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const r=[];
    tr.querySelectorAll('td').forEach(td=>r.push(td.innerText.trim()));
    cells.push(r);
  });
  return {mode:MODE, year:document.getElementById('year').value, church:document.getElementById('church').value,
    series:document.getElementById('series').value, cells, ts:new Date().toString()};
}
function storeKey(){return 'sermonplan_'+MODE+'_'+document.getElementById('year').value;}
function saveLocal(){
  if(!ROWS.length){alert('먼저 [연간 계획 생성]을 눌러주세요.');return;}
  localStorage.setItem(storeKey(), JSON.stringify(snapshot()));
  flash('저장되었습니다 ('+storeKey()+')');
}
function loadLocal(){
  const raw=localStorage.getItem(storeKey());
  if(!raw){alert('이 연도/모드로 저장된 계획이 없습니다.');return;}
  const data=JSON.parse(raw);
  document.getElementById('church').value=data.church||'';
  if(data.series!==undefined) document.getElementById('series').value=data.series;
  generate();
  // restore edited text
  const trs=document.querySelectorAll('#tbody tr');
  data.cells.forEach((row,ri)=>{ if(!trs[ri])return;
    trs[ri].querySelectorAll('td').forEach((td,ci)=>{
      if(td.hasAttribute('contenteditable') && row[ci]!==undefined && row[ci]!=='') td.innerText=row[ci];
    });
  });
  flash('불러왔습니다.');
}
function exportCSV(){
  if(!ROWS.length){alert('먼저 생성하세요.');return;}
  let csv='';
  const head=[]; document.querySelectorAll('#thead th').forEach(th=>head.push('"'+th.innerText+'"')); csv+=head.join(',')+'\n';
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const r=[]; tr.querySelectorAll('td').forEach(td=>r.push('"'+td.innerText.replace(/"/g,'""').replace(/\n/g,' ')+'"'));
    csv+=r.join(',')+'\n';
  });
  download('연간설교계획_'+MODE+'_'+document.getElementById('year').value+'.csv','﻿'+csv,'text/csv');
}
function exportJSON(){
  if(!ROWS.length){alert('먼저 생성하세요.');return;}
  download('연간설교계획_'+MODE+'_'+document.getElementById('year').value+'.json', JSON.stringify(snapshot(),null,2),'application/json');
}
function download(name,content,type){
  const blob=new Blob([content],{type:type+';charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
function clearAll(){
  if(!confirm('현재 표를 초기화할까요? (저장된 데이터는 유지됩니다)'))return;
  document.getElementById('tbody').innerHTML=''; document.getElementById('thead').innerHTML='';
  document.getElementById('meta').innerHTML=''; document.getElementById('legend').innerHTML='';
  document.getElementById('printhead').innerHTML=''; ROWS=[];
}
function flash(msg){
  let el=document.getElementById('savebar');
  if(!el){el=document.createElement('div');el.id='savebar';
    el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3a5a40;color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,.25);z-index:99;font-family:inherit';
    document.body.appendChild(el);}
  el.textContent='✓ '+msg; el.style.opacity='1';
  setTimeout(()=>{el.style.transition='opacity .6s';el.style.opacity='0';},1800);
}

/* init */
document.getElementById('year').value=new Date().getFullYear();
renderNote();
generate();
</script>
